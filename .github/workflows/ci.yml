
name: CI
on: [push, pull_request]
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npm run prepare
      - run: npx playwright install-deps
      
      - name: Run tests (excluding Workday)
        run: npx playwright test src/tests --reporter=list,html,junit,allure-playwright
        continue-on-error: true
        env:
          CI: true
      
      - name: Generate Allure report
        if: always()
        run: npm run allure:generate || echo "Allure generation skipped"
        continue-on-error: true
      
      - name: Upload Allure artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
        continue-on-error: true
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
        continue-on-error: true
      
